<!DOCTYPE html>
<html>
<head>
<title>Kuya Pao Payables Tracker</title>
<style>
body{
font-family: Arial;
background:#f4f6f8;
padding:40px;
}

h1{
color:#2c3e50;
}

table{
border-collapse: collapse;
width:70%;
background:white;
margin-top:10px;
}

th, td{
border:1px solid #ccc;
padding:10px;
text-align:center;
}

th{
background:#34495e;
color:white;
}

tfoot{
font-weight:bold;
background:#ecf0f1;
}
</style>
</head>

<body>

<h1>Kuya Pao – Payables and Deposits</h1>

<table id="trackerTable">
<tr>
<th>Payables</th>
<th>Amount</th>
<th>Deposit Date</th>
<th>Deposit</th>
</tr>
</table>

<script>

let payables = [
{name:"iPhone", amount:30000},
{name:"Singapore", amount:55000},
{name:"Apple", amount:30000},
{name:"Airfare", amount:30000},
{name:"Hotel", amount:30000},
{name:"Disney", amount:14000},
{name:"Hong Kong", amount:35000}
];

let deposits = [
{date:"2/8/2025", amount:5000},
{date:"7/4/2025", amount:5000},
{date:"7/8/2025", amount:5000},
{date:"9/5/2025", amount:5000},
{date:"11/12/2025", amount:5000},
{date:"11/25/2025", amount:25000},
{date:"11/28/2025", amount:5000},
{date:"12/12/2025", amount:5000},
{date:"1/27/2026", amount:25000},
{date:"2/27/2026", amount:10000},
{date:"3/10/2026", amount:5000}
];

function render(){

let table = document.getElementById("trackerTable");

let totalPayables = payables.reduce((sum, item) => sum + Number(item.amount), 0);
let totalDeposits = deposits.reduce((sum, item) => sum + Number(item.amount), 0);
let remainingBalance = totalPayables - totalDeposits;

let maxRows = Math.max(payables.length, deposits.length);

for(let i = 0; i < maxRows; i++){

let payableName = payables[i] ? payables[i].name : "";
let payableAmount = payables[i] ? Number(payables[i].amount).toLocaleString() : "";
let depositDate = deposits[i] ? deposits[i].date : "";
let depositAmount = deposits[i] ? Number(deposits[i].amount).toLocaleString() : "";

table.innerHTML += `
<tr>
<td>${payableName}</td>
<td>${payableAmount}</td>
<td>${depositDate}</td>
<td>${depositAmount}</td>
</tr>
`;

}

table.innerHTML += `
<tfoot>
<tr>
<td>Total Payables</td>
<td>${totalPayables.toLocaleString()}</td>
<td>Total Deposits</td>
<td>${totalDeposits.toLocaleString()}</td>
</tr>
<tr>
<td colspan="3">Remaining Balance</td>
<td>${remainingBalance.toLocaleString()}</td>
</tr>
</tfoot>
`;

}

render();

</script>

</body>
</html>
